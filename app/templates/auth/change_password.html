{% extends "base.html" %}

{% block title %}Změna hesla{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="page-header mb-3">
            <h1><i class="bi bi-key"></i> Změna hesla</h1>
        </div>
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="current_password" class="form-label">Současné heslo</label>
                        <input type="password" class="form-control" id="current_password"
                               name="current_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">Nové heslo</label>
                        <input type="password" class="form-control" id="new_password"
                               name="new_password" required minlength="6">
                        <div class="form-text">Minimálně 6 znaků.</div>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Potvrzení nového hesla</label>
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Změnit heslo
                        </button>
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">Zrušit</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
