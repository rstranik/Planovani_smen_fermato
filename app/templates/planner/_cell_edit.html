{# Inline edit form for a single cell - loaded via HTMX #}
<div class="cell-edit-form">
    <form hx-post="{{ url_for('planner.save_cell', plan_id=plan_id, emp_id=emp_id, cell_date=cell_date) }}"
          hx-target="closest .plan-cell-wrapper"
          hx-swap="innerHTML">

        <div class="cell-edit-tabs mb-1">
            <button type="button" class="btn btn-sm btn-outline-primary active cell-tab" data-tab="work" onclick="switchCellTab(this, 'work')">
                Práce
            </button>
            <button type="button" class="btn btn-sm btn-outline-warning cell-tab" data-tab="absence" onclick="switchCellTab(this, 'absence')">
                Absence
            </button>
        </div>

        <!-- Work tab -->
        <div class="cell-tab-content" id="tab-work-{{ emp_id }}-{{ cell_date }}">
            <select name="shift_template_id" class="form-select form-select-sm mb-1">
                <option value="">Směna</option>
                {% for s in shifts %}
                <option value="{{ s.id }}" {{ 'selected' if assignment and assignment.shift_template_id == s.id }}>
                    {{ s.name }}
                </option>
                {% endfor %}
            </select>

            <select name="department_id" class="form-select form-select-sm mb-1"
                    onchange="loadCellTasks(this, '{{ emp_id }}-{{ cell_date }}')">
                <option value="">Oddělení</option>
                {% for d in departments %}
                <option value="{{ d.id }}" {{ 'selected' if assignment and assignment.department_id == d.id }}>
                    {{ d.name }}
                </option>
                {% endfor %}
            </select>

            <select name="task_id" class="form-select form-select-sm mb-1"
                    id="cell-task-{{ emp_id }}-{{ cell_date }}">
                <option value="">Práce</option>
            </select>

            <input type="hidden" name="action" value="save">
        </div>

        <!-- Absence tab (hidden by default) -->
        <div class="cell-tab-content d-none" id="tab-absence-{{ emp_id }}-{{ cell_date }}">
            <select name="absence_type" class="form-select form-select-sm mb-1"
                    onchange="togglePartialAbsence(this, '{{ emp_id }}-{{ cell_date }}')">
                {% for val, label in absence_types %}
                <option value="{{ val }}" {{ 'selected' if assignment and assignment.is_absence and assignment.absence_type == val }}>
                    {{ label }}
                </option>
                {% endfor %}
            </select>

            <!-- Partial absence: work fields for lékař -->
            <div class="partial-absence-work d-none" id="partial-work-{{ emp_id }}-{{ cell_date }}">
                <small class="text-muted d-block mb-1">Zbytek dne:</small>
                <select name="partial_shift_id" class="form-select form-select-sm mb-1">
                    <option value="">Směna</option>
                    {% for s in shifts %}
                    <option value="{{ s.id }}" {{ 'selected' if assignment and assignment.is_absence and assignment.shift_template_id == s.id }}>
                        {{ s.name }}
                    </option>
                    {% endfor %}
                </select>
                <select name="partial_dept_id" class="form-select form-select-sm mb-1"
                        onchange="loadCellTasks(this, '{{ emp_id }}-{{ cell_date }}')">
                    <option value="">Oddělení</option>
                    {% for d in departments %}
                    <option value="{{ d.id }}" {{ 'selected' if assignment and assignment.is_absence and assignment.department_id == d.id }}>
                        {{ d.name }}
                    </option>
                    {% endfor %}
                </select>
                <select name="partial_task_id" class="form-select form-select-sm mb-1"
                        id="cell-task-{{ emp_id }}-{{ cell_date }}">
                    <option value="">Práce</option>
                </select>
            </div>
        </div>

        <input name="note" class="form-control form-control-sm mb-1" placeholder="Pozn."
               value="{{ assignment.note if assignment and assignment.note else '' }}">

        <div class="d-flex gap-1">
            <button type="submit" class="btn btn-sm btn-primary flex-grow-1">
                <i class="bi bi-check"></i>
            </button>
            <button type="submit" name="action" value="clear" class="btn btn-sm btn-outline-danger"
                    title="Vymazat">
                <i class="bi bi-x"></i>
            </button>
            <button type="button" class="btn btn-sm btn-outline-secondary"
                    hx-post="{{ url_for('planner.save_cell', plan_id=plan_id, emp_id=emp_id, cell_date=cell_date) }}"
                    hx-target="closest .plan-cell-wrapper"
                    hx-swap="innerHTML"
                    hx-vals='{"action":"cancel"}'
                    title="Zrušit">
                <i class="bi bi-arrow-counterclockwise"></i>
            </button>
        </div>
    </form>
</div>

<script>
(function() {
    // Load tasks for selected department in this cell (work tab)
    const deptSelect = document.querySelector('#tab-work-{{ emp_id }}-{{ cell_date }} [name="department_id"]');
    if (deptSelect && deptSelect.value) {
        loadCellTasks(deptSelect, '{{ emp_id }}-{{ cell_date }}', '{{ assignment.task_id if assignment and assignment.task_id else '' }}');
    }

    // If editing existing partial absence (lékař with work), show partial fields & load tasks
    {% if assignment and assignment.is_absence and assignment.absence_type == 'lekar' %}
    const absenceSelect = document.querySelector('#tab-absence-{{ emp_id }}-{{ cell_date }} [name="absence_type"]');
    if (absenceSelect) togglePartialAbsence(absenceSelect, '{{ emp_id }}-{{ cell_date }}');
    const partialDept = document.querySelector('#partial-work-{{ emp_id }}-{{ cell_date }} [name="partial_dept_id"]');
    if (partialDept && partialDept.value) {
        loadCellTasks(partialDept, '{{ emp_id }}-{{ cell_date }}', '{{ assignment.task_id if assignment and assignment.task_id else '' }}');
    }
    // Switch to absence tab since this is an absence
    const absTab = document.querySelector('#tab-absence-{{ emp_id }}-{{ cell_date }}').closest('.cell-edit-form');
    if (absTab) {
        const absBtn = absTab.querySelector('[data-tab="absence"]');
        if (absBtn) switchCellTab(absBtn, 'absence');
    }
    {% endif %}
})();
</script>
